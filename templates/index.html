<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE Signal Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --border: rgba(30,40,80,0.08);
    --border2: rgba(30,40,80,0.16);
    --text: #1a1f36;
    --muted: #7c85a2;
    --accent: #4f46e5;
    --buy: #0e9f6e;
    --buy-bg: rgba(14,159,110,0.07);
    --buy-border: rgba(14,159,110,0.22);
    --sell: #e02424;
    --sell-bg: rgba(224,36,36,0.07);
    --sell-border: rgba(224,36,36,0.22);
    --hold: #c27803;
    --hold-bg: rgba(194,120,3,0.07);
    --hold-border: rgba(194,120,3,0.22);
    --font-head: 'Plus Jakarta Sans', sans-serif;
    --font-serif: 'Instrument Serif', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(244,246,251,0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .logo { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 400; letter-spacing: -0.01em; color: var(--text); font-style: italic; }
  .logo span { color: var(--accent); font-style: normal; font-family: var(--font-head); font-weight: 700; font-size: 1.1rem; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 6px; transition: background 0.3s; }
  .status-dot.live { background: var(--buy); box-shadow: 0 0 8px rgba(14,159,110,0.4); animation: pulse 2s infinite; }
  .status-text { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .refresh-btn {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .refresh-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .last-update { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  .page { max-width: 1280px; margin: 0 auto; padding: 2rem; }

  .tabs { display: flex; gap: 4px; margin-bottom: 1.75rem; background: var(--surface); border-radius: 10px; padding: 4px; width: fit-content; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(30,40,80,0.06); }
  .tab-btn { font-family: var(--font-head); font-size: 13px; font-weight: 500; padding: 7px 22px; border-radius: 7px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,0.25); }

  .summary { display: flex; gap: 12px; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .sumcard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 22px; min-width: 110px; box-shadow: 0 1px 4px rgba(30,40,80,0.05); }
  .sumcard-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-weight: 600; }
  .sumcard-val { font-family: var(--font-head); font-size: 26px; font-weight: 700; }
  .sumcard-val.buy-col { color: var(--buy); }
  .sumcard-val.sell-col { color: var(--sell); }
  .sumcard-val.hold-col { color: var(--hold); }
  .sumcard-val.total-col { color: var(--text); }
  .sumcard-val.accent-col { color: var(--accent); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.25rem 1rem;
    transition: box-shadow 0.2s, transform 0.2s;
    position: relative; overflow: hidden;
    box-shadow: 0 1px 6px rgba(30,40,80,0.06);
  }
  .card:hover { box-shadow: 0 4px 20px rgba(30,40,80,0.10); transform: translateY(-1px); }
  .card.card-buy  { border-top: 3px solid var(--buy); }
  .card.card-sell { border-top: 3px solid var(--sell); }
  .card.card-hold { border-top: 3px solid var(--hold); }
  .card.card-bullish { border-top: 3px solid var(--buy); }
  .card.card-bearish { border-top: 3px solid var(--sell); }
  .card.card-neutral { border-top: 3px solid var(--hold); }

  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .stock-sym { font-family: var(--font-head); font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .stock-sec { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

  .badge { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 6px; font-family: var(--font-head); letter-spacing: 0.04em; }
  .badge-buy      { background: var(--buy-bg);  color: var(--buy);  border: 1px solid var(--buy-border); }
  .badge-sell     { background: var(--sell-bg); color: var(--sell); border: 1px solid var(--sell-border); }
  .badge-hold     { background: var(--hold-bg); color: var(--hold); border: 1px solid var(--hold-border); }
  .badge-bullish  { background: var(--buy-bg);  color: var(--buy);  border: 1px solid var(--buy-border); }
  .badge-bearish  { background: var(--sell-bg); color: var(--sell); border: 1px solid var(--sell-border); }
  .badge-neutral  { background: var(--hold-bg); color: var(--hold); border: 1px solid var(--hold-border); }

  .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .price-ltp { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: var(--text); }
  .price-chg { font-size: 12px; font-weight: 600; font-family: var(--font-mono); }
  .price-chg.pos { color: var(--buy); }
  .price-chg.neg { color: var(--sell); }

  .levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .level-box { background: var(--surface2); border-radius: 8px; padding: 8px 10px; border: 1px solid var(--border); }
  .level-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; font-weight: 600; }
  .level-val { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
  .level-val.entry { color: var(--text); }
  .level-val.target { color: var(--buy); }
  .level-val.sl { color: var(--sell); }

  .rr-bar { margin-bottom: 10px; }
  .rr-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; border: 1px solid var(--border); }
  .rr-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .rr-fill.buy-fill  { background: var(--buy); }
  .rr-fill.sell-fill { background: var(--sell); }
  .rr-fill.hold-fill { background: var(--hold); }
  .rr-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }

  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { font-size: 10px; padding: 3px 9px; border-radius: 5px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-family: var(--font-mono); font-weight: 500; }

  .why { font-size: 12px; color: var(--muted); line-height: 1.65; border-top: 1px solid var(--border); padding-top: 10px; font-family: var(--font-head); }
  .why strong { color: var(--text); font-weight: 600; }

  .updated { font-size: 9px; color: var(--muted); margin-top: 8px; text-align: right; opacity: 0.5; font-family: var(--font-mono); }

  .loading { text-align: center; padding: 5rem 2rem; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 13px; }

  .error-box { background: var(--sell-bg); border: 1px solid var(--sell-border); border-radius: 10px; padding: 1.5rem; margin: 2rem 0; }
  .error-box h3 { color: var(--sell); font-family: var(--font-head); margin-bottom: 8px; font-weight: 700; }
  .error-box p { font-size: 12px; color: var(--muted); line-height: 1.7; font-family: var(--font-head); }
  .error-box code { color: var(--text); background: var(--surface2); padding: 2px 7px; border-radius: 4px; font-family: var(--font-mono); font-size: 11px; }

  .disclaimer { font-size: 11px; color: var(--muted); margin-top: 2rem; padding: 1rem 1.25rem; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); line-height: 1.7; font-family: var(--font-head); }

  .conf-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: var(--font-mono); letter-spacing: 0.04em; }
  .conf-high { background: rgba(79,70,229,0.08); color: #4f46e5; border: 1px solid rgba(79,70,229,0.2); }
  .conf-med  { background: rgba(194,120,3,0.08);  color: var(--hold); border: 1px solid var(--hold-border); }
  .conf-low  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .mini-chart { margin: 10px 0 8px; border-top: 1px solid var(--border); padding-top: 10px; }
  .mini-chart-line { position: relative; width: 100%; height: 72px; }
  .mini-chart-vol  { position: relative; width: 100%; height: 28px; margin-top: 3px; }
  .chart-axis-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-top: 3px; opacity: 0.7; font-family: var(--font-mono); }

  .index-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow-x: auto;
  }
  .index-tile {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 24px 10px 0;
    margin-right: 24px;
    border-right: 1px solid var(--border);
    min-width: 160px;
    flex-shrink: 0;
  }
  .index-tile:last-child { border-right: none; }
  .index-name { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .index-row  { display: flex; align-items: baseline; gap: 8px; }
  .index-val  { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--text); }
  .index-chg  { font-size: 12px; font-weight: 600; font-family: var(--font-mono); }
  .index-chg.pos { color: var(--buy); }
  .index-chg.neg { color: var(--sell); }
  .index-chg.flat { color: var(--muted); }
  .index-hl   { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }
  .index-mood { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-left: 4px; letter-spacing: 0.05em; }
  .mood-bullish { background: var(--buy-bg); color: var(--buy); border: 1px solid var(--buy-border); }
  .mood-bearish { background: var(--sell-bg); color: var(--sell); border: 1px solid var(--sell-border); }
  .mood-flat    { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .index-spark  { position: relative; width: 80px; height: 28px; margin-left: auto; }
  .index-tile-inner { display: flex; align-items: center; gap: 10px; }

  /* ── News Feed styles ── */
  .news-filters { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  .news-filter-btn {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border2);
    background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .news-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .news-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .news-filter-btn.bullish.active { background: var(--buy); border-color: var(--buy); color: #fff; }
  .news-filter-btn.bearish.active { background: var(--sell); border-color: var(--sell); color: #fff; }

  .news-list { display: flex; flex-direction: column; gap: 10px; }
  .news-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
    transition: box-shadow 0.2s, transform 0.2s;
    box-shadow: 0 1px 4px rgba(30,40,80,0.05);
    text-decoration: none; display: block; color: inherit;
  }
  .news-card:hover { box-shadow: 0 4px 16px rgba(30,40,80,0.10); transform: translateY(-1px); }
  .news-card.bullish { border-left: 3px solid var(--buy); }
  .news-card.bearish { border-left: 3px solid var(--sell); }
  .news-card.neutral { border-left: 3px solid var(--hold); }

  .news-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .news-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; flex: 1; }
  .news-score { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 5px; white-space: nowrap; }
  .news-score.high { background: rgba(79,70,229,0.08); color: #4f46e5; border: 1px solid rgba(79,70,229,0.2); }
  .news-score.medium { background: var(--hold-bg); color: var(--hold); border: 1px solid var(--hold-border); }

  .news-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .news-source { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
  .news-time   { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
  .news-tickers { display: flex; gap: 4px; flex-wrap: wrap; }
  .news-ticker { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--surface2); color: var(--accent); border: 1px solid rgba(79,70,229,0.15); font-family: var(--font-mono); font-weight: 600; }

  .news-empty { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 13px; }

  .ticker-search { padding: 8px 14px; border: 1px solid var(--border2); border-radius: 8px; font-family: var(--font-mono); font-size: 12px; background: var(--surface); color: var(--text); width: 180px; outline: none; }
  .ticker-search:focus { border-color: var(--accent); }
  .ticker-search::placeholder { color: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">NSE<span>Signal</span>Desk</div>
  <div class="topbar-right">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ Refresh</button>
    <button class="refresh-btn" onclick="testAlert()" title="Send test Telegram alert">🔔 Test Alert</button>
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">connecting...</span>
    </div>
  </div>
</div>

<div class="index-bar" id="indexBar">
  <div class="index-tile" style="color:var(--muted);font-size:12px;justify-content:center;">Loading indices...</div>
</div>

<div class="page">
  <div class="tabs">
    <button class="tab-btn active" id="tab-swing"    onclick="switchTab('swing')">Swing  (2–10 days)</button>
    <button class="tab-btn"        id="tab-intraday" onclick="switchTab('intraday')">Intraday  (today)</button>
    <button class="tab-btn"        id="tab-news"     onclick="switchTab('news')">News Feed</button>
  </div>

  <div class="summary" id="summary"></div>
  <div id="content"></div>

  <div class="disclaimer">
    For educational purposes only. Not financial advice. Always do your own research and consult a SEBI-registered advisor before investing. Past signals do not guarantee future results.
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API         = "http://localhost:5000/api/signals";
const INDICES_API = "http://localhost:5000/api/indices";
const NEWS_API    = "http://34.42.82.253:5000/api/news";
const NEWS_TOP_API= "http://34.42.82.253:5000/api/news/top";

let allData = [];
let allNews = [];
let currentTab = "swing";
let newsFilter = "all";
let tickerSearch = "";
let sparkCharts = {};

// ── Tab switching ──
function switchTab(tab) {
  currentTab = tab;
  ["swing","intraday","news"].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle("active", t === tab);
  });
  if (tab === "news") {
    renderNewsSummary();
    renderNews();
  } else {
    renderAll();
  }
}

// ── Signal loading ──
async function loadSignals() {
  const btn = document.getElementById("refreshBtn");
  const dot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");

  btn.disabled = true;
  btn.textContent = "Loading...";
  dot.className = "status-dot";
  statusText.textContent = "fetching...";

  document.getElementById("content").innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Fetching live prices from Angel One + computing signals...</p>
    </div>`;
  document.getElementById("summary").innerHTML = "";

  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    allData = json.data || [];
    dot.className = "status-dot live";
    statusText.textContent = "live";
    document.getElementById("lastUpdate").textContent = "Updated " + new Date().toLocaleTimeString("en-IN");
    if (currentTab !== "news") renderAll();
  } catch (err) {
    dot.className = "status-dot";
    statusText.textContent = "offline";
    if (currentTab !== "news") {
      document.getElementById("content").innerHTML = `
        <div class="error-box">
          <h3>Could not connect to proxy server</h3>
          <p>Make sure <code>proxy.py</code> is running.<br>Error: ${err.message}</p>
        </div>`;
    }
  } finally {
    btn.disabled = false;
    btn.textContent = "↻ Refresh";
  }
}

// ── News loading ──
async function loadNews() {
  try {
    const res = await fetch(NEWS_API);
    if (!res.ok) throw new Error(`NewsDesk returned ${res.status}`);
    const json = await res.json();
    allNews = json || [];
  } catch (err) {
    console.warn("NewsDesk fetch failed:", err.message);
    allNews = [];
  }
}

// ── News summary strip ──
function renderNewsSummary() {
  const bullish = allNews.filter(n => n.sentiment === "BULLISH").length;
  const bearish = allNews.filter(n => n.sentiment === "BEARISH").length;
  const neutral = allNews.filter(n => n.sentiment === "NEUTRAL").length;
  const high    = allNews.filter(n => n.relevance_score >= 8).length;

  document.getElementById("summary").innerHTML = `
    <div class="sumcard"><div class="sumcard-label">Total news</div><div class="sumcard-val total-col">${allNews.length}</div></div>
    <div class="sumcard"><div class="sumcard-label">Bullish</div><div class="sumcard-val buy-col">${bullish}</div></div>
    <div class="sumcard"><div class="sumcard-label">Bearish</div><div class="sumcard-val sell-col">${bearish}</div></div>
    <div class="sumcard"><div class="sumcard-label">Neutral</div><div class="sumcard-val hold-col">${neutral}</div></div>
    <div class="sumcard"><div class="sumcard-label">High priority</div><div class="sumcard-val accent-col">${high}</div></div>
  `;
}

// ── News render ──
function renderNews() {
  let filtered = [...allNews];

  if (newsFilter === "bullish")  filtered = filtered.filter(n => n.sentiment === "BULLISH");
  if (newsFilter === "bearish")  filtered = filtered.filter(n => n.sentiment === "BEARISH");
  if (newsFilter === "top")      filtered = filtered.filter(n => n.relevance_score >= 8);

  if (tickerSearch.trim()) {
    const q = tickerSearch.trim().toUpperCase();
    filtered = filtered.filter(n => {
      const tickers = parseTickers(n.tickers);
      return tickers.some(t => t.includes(q)) || n.title.toUpperCase().includes(q);
    });
  }

  const content = document.getElementById("content");

  if (!allNews.length) {
    content.innerHTML = `<div class="news-empty">Loading news from NewsDesk... If this persists, check GCP VM is running.</div>`;
    return;
  }

  if (!filtered.length) {
    content.innerHTML = `<div class="news-empty">No news matches this filter.</div>`;
    return;
  }

  content.innerHTML = `
    <div class="news-filters">
      <button class="news-filter-btn ${newsFilter==='all'?'active':''}"      onclick="setNewsFilter('all')">All</button>
      <button class="news-filter-btn bullish ${newsFilter==='bullish'?'active':''}" onclick="setNewsFilter('bullish')">Bullish</button>
      <button class="news-filter-btn bearish ${newsFilter==='bearish'?'active':''}" onclick="setNewsFilter('bearish')">Bearish</button>
      <button class="news-filter-btn ${newsFilter==='top'?'active':''}"      onclick="setNewsFilter('top')">High Priority</button>
      <input class="ticker-search" id="tickerSearchInput" type="text" placeholder="Search ticker / keyword..." value="${tickerSearch}" oninput="onTickerSearch(this.value)" />
    </div>
    <div class="news-list">
      ${filtered.map(n => newsCardHTML(n)).join("")}
    </div>
  `;
}

function newsCardHTML(n) {
  const sentiment = (n.sentiment || "NEUTRAL").toLowerCase();
  const tickers   = parseTickers(n.tickers);
  const scoreClass = n.relevance_score >= 8 ? "high" : "medium";
  const timeStr   = formatNewsTime(n.published_at);

  const tickerHTML = tickers.length
    ? `<div class="news-tickers">${tickers.map(t => `<span class="news-ticker">${t}</span>`).join("")}</div>`
    : "";

  return `
    <a class="news-card ${sentiment}" href="${n.url}" target="_blank" rel="noopener">
      <div class="news-card-head">
        <div class="news-title">${n.title}</div>
        <span class="news-score ${scoreClass}">${n.relevance_score}/10</span>
      </div>
      <div class="news-meta">
        <span class="badge badge-${sentiment}">${(n.sentiment||'NEUTRAL')}</span>
        <span class="news-source">${n.source}</span>
        <span class="news-time">${timeStr}</span>
        ${tickerHTML}
      </div>
    </a>`;
}

function parseTickers(raw) {
  if (!raw) return [];
  try {
    const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

function formatNewsTime(str) {
  if (!str) return "—";
  try {
    const d = new Date(str);
    return d.toLocaleString("en-IN", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
  } catch { return str.slice(0, 16); }
}

function setNewsFilter(f) {
  newsFilter = f;
  renderNews();
}

function onTickerSearch(val) {
  tickerSearch = val;
  renderNews();
}

// ── Signal tab rendering ──
function renderAll() {
  renderSummary();
  renderCards();
}

function renderSummary() {
  if (!allData.length) return;
  const key = currentTab;
  const buy  = allData.filter(s => s[key].signal === "buy").length;
  const sell = allData.filter(s => s[key].signal === "sell").length;
  const hold = allData.filter(s => s[key].signal === "hold").length;

  document.getElementById("summary").innerHTML = `
    <div class="sumcard"><div class="sumcard-label">Total scanned</div><div class="sumcard-val total-col">${allData.length}</div></div>
    <div class="sumcard"><div class="sumcard-label">Buy signals</div><div class="sumcard-val buy-col">${buy}</div></div>
    <div class="sumcard"><div class="sumcard-label">Sell signals</div><div class="sumcard-val sell-col">${sell}</div></div>
    <div class="sumcard"><div class="sumcard-label">Hold / Wait</div><div class="sumcard-val hold-col">${hold}</div></div>
  `;
}

function renderCards() {
  if (!allData.length) return;
  const key = currentTab;
  const order = { buy: 0, sell: 1, hold: 2 };
  const sorted = [...allData].sort((a, b) => order[a[key].signal] - order[b[key].signal]);
  document.getElementById("content").innerHTML = `<div class="grid">${sorted.map(s => cardHTML(s, key)).join("")}</div>`;
  sorted.forEach(s => drawChart(s));
}

function cardHTML(s, key) {
  const d = s[key];
  const sig = d.signal;
  const chgClass = s.change >= 0 ? "pos" : "neg";
  const chgSign  = s.change >= 0 ? "+" : "";

  const levelsHTML = d.entry ? `
    <div class="levels">
      <div class="level-box"><div class="level-label">Entry</div><div class="level-val entry">₹${fmt(d.entry)}</div></div>
      <div class="level-box"><div class="level-label">Target</div><div class="level-val target">₹${fmt(d.target)}</div></div>
      <div class="level-box"><div class="level-label">Stop loss</div><div class="level-val sl">₹${fmt(d.sl)}</div></div>
    </div>` : "";

  const rrVal = (d.entry && d.target && d.sl)
    ? Math.abs((d.target - d.entry) / (d.entry - d.sl)).toFixed(1) : null;
  const pct = (d.entry && d.target && d.sl)
    ? Math.min(100, Math.max(0, Math.round(((s.price - Math.min(d.sl, d.target)) / Math.abs(d.target - d.sl)) * 100))) : 0;

  const rrHTML = rrVal ? `
    <div class="rr-bar">
      <div class="rr-track"><div class="rr-fill ${sig}-fill" style="width:${pct}%"></div></div>
      <div class="rr-meta"><span>SL ₹${fmt(d.sl)}</span><span>R:R ${rrVal}x</span><span>Target ₹${fmt(d.target)}</span></div>
    </div>` : "";

  const confColor = d.confidence === "high" ? "conf-high" : d.confidence === "medium" ? "conf-med" : "conf-low";

  return `
    <div class="card card-${sig}">
      <div class="card-head">
        <div>
          <div class="stock-sym">${s.symbol}</div>
          <div class="stock-sec">${s.sector}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <span class="badge badge-${sig}">${sig.toUpperCase()}</span>
          <span class="conf-badge ${confColor}">${(d.confidence||'').toUpperCase()} · ${d.score > 0 ? '+' : ''}${d.score}</span>
        </div>
      </div>
      <div class="price-row">
        <span class="price-ltp">₹${fmt(s.price)}</span>
        <span class="price-chg ${chgClass}">${chgSign}${s.change}%</span>
      </div>
      <div class="mini-chart">
        <div class="mini-chart-line"><canvas id="line-${s.symbol}"></canvas></div>
        <div class="mini-chart-vol"><canvas id="vol-${s.symbol}"></canvas></div>
        <div class="chart-axis-label">
          <span>${s.chart ? s.chart.dates[0] : ''}</span>
          <span style="opacity:0.4">30 days</span>
          <span>${s.chart ? s.chart.dates[s.chart.dates.length - 1] : ''}</span>
        </div>
      </div>
      ${levelsHTML}
      ${rrHTML}
      <div class="tags">${d.indicators.map(i => `<span class="tag">${i}</span>`).join("")}</div>
      <div class="why"><strong>Why:</strong> ${d.reason}</div>
      ${key === 'intraday' && s.intraday_source ? `<div class="updated">${s.intraday_source === '5min' ? '⚡ 5-min candles' : '📅 daily candles'} · ${s.updated}</div>` : `<div class="updated">↻ ${s.updated}</div>`}
    </div>`;
}

function drawChart(s) {
  if (!s.chart) return;
  const sig = s[currentTab].signal;
  const lineColor = sig === "buy" ? "#0e9f6e" : sig === "sell" ? "#e02424" : "#c27803";
  const fillColor = sig === "buy" ? "rgba(14,159,110,0.08)" : sig === "sell" ? "rgba(224,36,36,0.08)" : "rgba(194,120,3,0.08)";
  const volColor  = sig === "buy" ? "rgba(14,159,110,0.30)" : sig === "sell" ? "rgba(224,36,36,0.30)" : "rgba(194,120,3,0.30)";
  const commonOpts = {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 400 },
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    elements: { point: { radius: 0 } },
    scales: { x: { display: false }, y: { display: false, grid: { display: false } } }
  };
  const lineCtx = document.getElementById(`line-${s.symbol}`);
  if (lineCtx) new Chart(lineCtx, { type: "line", data: { labels: s.chart.dates, datasets: [{ data: s.chart.close, borderColor: lineColor, borderWidth: 1.5, fill: true, backgroundColor: fillColor, tension: 0.3 }] }, options: commonOpts });
  const volCtx = document.getElementById(`vol-${s.symbol}`);
  if (volCtx) new Chart(volCtx, { type: "bar", data: { labels: s.chart.dates, datasets: [{ data: s.chart.volume, backgroundColor: volColor, borderWidth: 0, borderRadius: 1 }] }, options: { ...commonOpts, scales: { x: { display: false }, y: { display: false } } } });
}

function fmt(n) {
  if (n == null) return "—";
  return Number(n).toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Indices ──
async function loadIndices() {
  try {
    const res = await fetch(INDICES_API);
    const json = await res.json();
    if (json.error || !json.data) return;
    Object.values(sparkCharts).forEach(c => c.destroy());
    sparkCharts = {};
    const bar = document.getElementById("indexBar");
    bar.innerHTML = json.data.map(idx => {
      const chgSign  = idx.change >= 0 ? "+" : "";
      const chgClass = idx.change > 0.5 ? "pos" : idx.change < -0.5 ? "neg" : "flat";
      return `
        <div class="index-tile">
          <div class="index-name">${idx.name}</div>
          <div class="index-tile-inner">
            <div>
              <div class="index-row">
                <span class="index-val">${Number(idx.value).toLocaleString("en-IN", {maximumFractionDigits:2})}</span>
                <span class="index-chg ${chgClass}">${chgSign}${idx.change}%</span>
                <span class="index-mood mood-${idx.mood}">${idx.mood.toUpperCase()}</span>
              </div>
              <div class="index-hl">H: ${Number(idx.high).toLocaleString("en-IN")} &nbsp; L: ${Number(idx.low).toLocaleString("en-IN")}</div>
            </div>
            <div class="index-spark"><canvas id="spark-${idx.name.replace(/\s/g,'')}"></canvas></div>
          </div>
        </div>`;
    }).join("");
    json.data.forEach(idx => {
      const id = `spark-${idx.name.replace(/\s/g,'')}`;
      const ctx = document.getElementById(id);
      if (!ctx || !idx.spark) return;
      const isUp = idx.change >= 0;
      sparkCharts[id] = new Chart(ctx, { type: "line", data: { labels: idx.spark.map((_,i)=>i), datasets: [{ data: idx.spark, borderColor: isUp ? "#0e9f6e" : "#e02424", borderWidth: 1.5, fill: false, tension: 0.3, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } } });
    });
  } catch (e) { console.warn("Indices load failed:", e); }
}

async function testAlert() {
  try {
    const res = await fetch("http://localhost:5000/api/test-alert");
    const json = await res.json();
    alert("Test alert sent! Check your Telegram.");
  } catch (e) {
    alert("Could not reach proxy server. Make sure proxy.py is running.");
  }
}

async function loadAll() {
  await Promise.all([loadSignals(), loadIndices(), loadNews()]);
  if (currentTab === "news") {
    renderNewsSummary();
    renderNews();
  }
  try {
    const h = await fetch("http://localhost:5000/api/health");
    const hj = await h.json();
    const dot = document.getElementById("statusDot");
    const txt = document.getElementById("statusText");
    if (hj.websocket === "connected") {
      dot.className = "status-dot live";
      txt.textContent = `live · ${hj.live_prices} ticks`;
    } else {
      dot.className = "status-dot";
      txt.textContent = "ws offline";
    }
  } catch(e) {}
}

loadAll();

setInterval(() => {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const inMarket = (h > 9 || (h === 9 && m >= 15)) && (h < 15 || (h === 15 && m <= 30));
  if (inMarket) loadAll();
}, 5 * 60 * 1000);
</script>
