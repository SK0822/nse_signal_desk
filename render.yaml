services:
  - type: web
    name: nse-signal-desk
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python proxy.py
    envVars:
      - key: API_KEY
        sync: false
      - key: CLIENT_CODE
        sync: false
      - key: MPIN
        sync: false
      - key: TOTP_SECRET
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
